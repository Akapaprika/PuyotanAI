name: Performance Benchmark Comparison

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # GitHub ActionsのNode.js 24への移行に伴う互換性のための環境変数

on:
  push:
    branches:
      - main  # push（キャッシュの最終保存）は mainブランチ へのマージ時のみに制限
    paths:
      - 'native/**'
      - 'tests/perf/**'
  pull_request:
    branches:
      - main  # main向けのPR（開発中ブランチのプッシュ時）にトリガー
    paths:
      - 'native/**'
      - 'tests/perf/**'
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  benchmark:
    name: Benchmark Comparison (Welch's t-test)
    runs-on: windows-latest

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          path: pr-branch
          # 【重要修正】仮のマージコミットではなく、開発中の生のコミットハッシュを強制的に取得します
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - name: Get Parent SHA
        id: parent
        shell: bash
        run: |
          PARENT_SHA=$(git -C pr-branch rev-parse HEAD~1 || echo "")
          echo "sha=$PARENT_SHA" >> $GITHUB_OUTPUT

      - name: Restore Previous Commit Benchmark Cache
        id: restore-cache
        uses: actions/cache/restore@v4
        if: steps.parent.outputs.sha != ''
        with:
          path: pr-branch/pr_results.json
          key: bench-results-${{ steps.parent.outputs.sha }}

      # ── 上書きされる前に、キャッシュから復元したデータを即座に退避（コピー）させます ──
      - name: Prepare Base Results from Cache
        if: steps.restore-cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          cp pr-branch/pr_results.json pr-branch/base_results.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybind11

      - name: Build C++ Native on PR Branch
        shell: bash
        run: |
          cd pr-branch/native
          ./build.bat

      - name: Run Regression Tests on PR Branch
        shell: bash
        run: |
          cd pr-branch/native/build_Release/Release
          ./engine_benchmark.exe --regression
          ./beam_search_benchmark.exe --regression

      - name: Run PR Benchmarks (Current Commit)
        run: |
          python pr-branch/tests/perf/run_stat_bench.py --run --iterations 30 --duration 10 --output pr-branch/pr_results.json

      # ── キャッシュの有無に応じたベース（比較元）データの準備 ──

      - name: Checkout Base Branch (Fallback)
        if: steps.restore-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref || 'main' }}
          path: base-branch

      - name: Build C++ Native on Base Branch (Fallback)
        if: steps.restore-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          if [ -d "base-branch/native" ] && [ -f "base-branch/native/build.bat" ]; then
            cd base-branch/native
            ./build.bat || echo "Build failed or skipped on base branch. Continuing to fallback!"
          else
            echo "Base branch does not have the native folder or build.bat yet. Skipping compilation!"
          fi

      - name: Run Regression Tests on Base Branch (Fallback)
        if: steps.restore-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          if [ -d "base-branch/native/build_Release/Release" ]; then
            cd base-branch/native/build_Release/Release
            ./engine_benchmark.exe --regression
            ./beam_search_benchmark.exe --regression
          else
            echo "Skipping regression tests on base branch (Folder not found)."
          fi

      - name: Run Base Benchmarks (Fallback)
        if: steps.restore-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p base-branch/tests/perf
          cp pr-branch/tests/perf/run_stat_bench.py base-branch/tests/perf/run_stat_bench.py
          
          if [ -f "base-branch/native/build_Release/Release/engine_benchmark.exe" ]; then
            python base-branch/tests/perf/run_stat_bench.py --run --iterations 30 --duration 10 --output pr-branch/base_results.json
          else
            echo "Base branch does not have the benchmark executables yet. Copying PR results as baseline (0% change)."
            cp pr-branch/pr_results.json pr-branch/base_results.json
          fi

      # ── 比較とレポート生成 ──

      - name: Compare Benchmarks
        run: |
          python pr-branch/tests/perf/run_stat_bench.py --compare pr-branch/base_results.json pr-branch/pr_results.json --output-md comparison_report.md

      - name: Display Report in Console
        run: |
          type comparison_report.md

      # 【最重要修正】キャッシュの保存キーにも、生のコミットハッシュ（PRのHEAD）を使用します
      - name: Save Current Commit Benchmark Cache
        uses: actions/cache/save@v4
        with:
          path: pr-branch/pr_results.json
          key: bench-results-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Upload Report Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            comparison_report.md
            pr-branch/base_results.json
            pr-branch/pr_results.json

      - name: Comment PR with Report
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v2.5.0
        with:
          filePath: comparison_report.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}